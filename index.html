<!DOCTYPE html>
<html>
<head>
  <title>Claim THR Kaka Ica🎁</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #310505, #1a0000, #2b0000);
      color: #ff4d4d;
      text-align: center;
      padding-top: 100px;
      overflow: hidden;
    }

    .box {
      background: rgba(20, 0, 0, 0.9);
      padding: 30px;
      border-radius: 20px;
      display: inline-block;
      box-shadow: 0 0 25px rgba(255, 0, 0, 0.6);
      border: 1px solid rgba(255, 0, 0, 0.4);
      transition: all 0.5s ease;
      max-width: 90%;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 80%;
      border-radius: 10px;
      border: 1px solid #ff3333;
      background: #0d0000;
      color: #ff8080;
      outline: none;
    }

    input::placeholder {
      color: #ff6666;
    }

    .row {
      display: flex;
      justify-content: center;
      gap: 5px;
      width: 80%;
      margin: 10px auto;
    }

    .row select {
      width: 40%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ff3333;
      background: #0d0000;
      color: #ff8080;
    }

    .row input {
      width: 60%;
      margin: 0;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(45deg, #ff0000, #ff4d4d);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
    }

    button:hover {
      background: linear-gradient(45deg, #ff1a1a, #ff6666);
      transform: scale(1.08);
      box-shadow: 0 0 25px rgba(255, 0, 0, 1);
    }

    #step2, #step3, #success {
      display: none;
      opacity: 0;
      transform: scale(0.8);
    }

    img {
      width: 200px;
      margin: 20px 0;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
    }

    .fade-out {
      opacity: 0;
      transform: scale(0.8);
    }

    .fade-in {
      opacity: 1 !important;
      transform: scale(1) !important;
    }

    h1, h2 {
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.9);
    }

    @media (max-width: 600px) {
      body {
        padding-top: 50px;
      }

      .box {
        width: 90%;
        padding: 20px;
      }

      .row {
        flex-direction: column;
      }

      .row select, .row input {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<!-- STEP 1 -->
<div class="box" id="step1">
  <h1>🎀 CLAIM THR 🎀</h1>
  <p>Di isi yaakk, cuma bisa kirim ke e-wallet hehe</p>

  <input type="text" id="nama" placeholder="Nama kaka" required>
  
  <div class="row">
    <select id="ewallet">
      <option value="DANA">DANA</option>
      <option value="GoPay">GoPay</option>
      <option value="OVO">OVO</option>
      <option value="ShopeePay">ShopeePay</option>
    </select>

    <input 
      type="text" 
      id="nomor" 
      placeholder="Nomor E-Wallet" 
      required
      oninput="this.value = this.value.replace(/[^0-9]/g, '')"
    >
  </div>

  <button onclick="nextStep()">CLAIM SEKARANG 😊</button>
</div>

<!-- STEP 2 -->
<div class="box" id="step2">
  <h2>💖 Kaka mohon maap lahir batin yak 💖</h2>

  <img src="https://p16-sign-sg.tiktokcdn.com/tos-alisg-p-0037/oIzgM5eGgg8tN6NirBc0VfPBfLUAEILiLDefgA~tplv-tiktokx-origin.image?dr=14575&x-expires=1774501200&x-signature=9%2BYuXdulqQYLxzlZNghLQBNlYuI%3D&t=4d5b0474&ps=13740610&shp=81f88b70&shcp=43f4a2f9&idc=my2">

  <p>Kaka maapkan adik2 ini yg banyak salah 😊</p>

  <form id="realForm">
    <input type="hidden" id="hiddenNama">
    <input type="hidden" id="hiddenNomor">
    <input type="hidden" id="hiddenWallet">

    <button type="submit">KIRIM SEKARANG 💸</button>
  </form>
</div>

<!-- STEP 3 -->
<div class="box" id="step3">
  <h2>Pencet sekali lagi 😋</h2>
  <button onclick="kirimData()">LANJUT KIRIM 😊</button>
</div>

<!-- SUCCESS -->
<div class="box" id="success">
  <h2>🎉 DAH KELAR 🎉</h2>
  <p>Aku mah apa atuh cuma bisa ksih dikit 😔</p>
  <p>Mana kerasa di dompet kaka yg tebal 😭</p>
</div>

<script>
// JS lu ga gw ubah sama sekali
function nextStep() {
  let nama = document.getElementById("nama").value.trim();
  let nomor = document.getElementById("nomor").value.trim();
  let wallet = document.getElementById("ewallet").value;

  if (!nama || !nomor) {
    alert("Isi dulu kaka 😭");
    return;
  }

  if (!/^08[0-9]{8,11}$/.test(nomor)) {
    alert("Nomor E-Wallet ga valid 😭");
    return;
  }

  document.getElementById("hiddenNama").value = nama;
  document.getElementById("hiddenNomor").value = nomor;
  document.getElementById("hiddenWallet").value = wallet;

  let step1 = document.getElementById("step1");
  let step2 = document.getElementById("step2");

  step1.classList.add("fade-out");

  setTimeout(() => {
    step1.style.display = "none";
    step2.style.display = "inline-block";
    setTimeout(() => step2.classList.add("fade-in"), 50);
  }, 500);
}

document.getElementById("realForm").addEventListener("submit", function(e) {
  e.preventDefault();

  let step2 = document.getElementById("step2");
  let step3 = document.getElementById("step3");

  step2.classList.add("fade-out");

  setTimeout(() => {
    step2.style.display = "none";
    step3.style.display = "inline-block";
    setTimeout(() => step3.classList.add("fade-in"), 50);
  }, 500);
});

function kirimData() {
  let nama = document.getElementById("hiddenNama").value;
  let nomor = document.getElementById("hiddenNomor").value;
  let wallet = document.getElementById("hiddenWallet").value;

  let formData = new FormData();

  formData.append("payload_json", JSON.stringify({
    content:
      "🎁 THR CLAIM\n\n" +
      "👤 Nama: " + nama + "\n" +
      "📱 Nomor: " + nomor + "\n" +
      "💳 E-Wallet: " + wallet
  }));

  fetch("https://discord.com/api/webhooks/1484678541990953082/wQ6pSPTqGeiTlZ50nmQ_KGjG8xGZSbDAijTD1C3gAMaiJXimQJpoOUTzx5cn85EEFGV5", {
    method: "POST",
    body: formData
  })
  .then(() => {
    showSuccess();
  })
  .catch(() => {
    alert("Gagal kirim 😭");
  });
}

function showSuccess() {
  document.getElementById("step3").style.display = "none";

  let success = document.getElementById("success");
  success.style.display = "inline-block";

  setTimeout(() => {
    success.classList.add("fade-in");
  }, 50);
}
</script>

</body>
</html>
